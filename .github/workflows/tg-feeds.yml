name: Telegram Feeds

on:
  schedule:
    # Каждые 30 минут
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Один запуск за раз; новый вытесняет предыдущий, если он ещё идёт
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape Telegram channels
        env:
          # GitHub Pages URL формируется из имени пользователя и репозитория.
          # Подставьте вашу ссылку в Settings -> Environments -> github-pages
          # или задайте FEED_BASE_URL как repository variable ниже.
          FEED_BASE_URL: ${{ vars.FEED_BASE_URL }}
        run: python scraper/scrape_telegram.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
